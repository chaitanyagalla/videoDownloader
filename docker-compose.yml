services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    environment:
      # Netscape-format YouTube cookie file, mounted read-only below.
      # Defeats YouTube's "Sign in to confirm you're not a bot" challenge
      # that datacenter IPs almost always hit.
      YTDLP_COOKIES_FILE: /run/secrets/youtube-cookies.txt
    volumes:
      - ./backend/secrets/youtube-cookies.txt:/run/secrets/youtube-cookies.txt:ro
    restart: unless-stopped
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
